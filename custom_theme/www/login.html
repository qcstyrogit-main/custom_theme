{%- extends "templates/web.html" -%}

{%- block head %} 
{{ super() }}
<!-- Include external login CSS -->
<link rel="stylesheet" href="/assets/custom_theme/css/login.css">
{%- endblock %}

{%- block page_content %}
<div class="custom-login-page">
    <div class="login-right">
        <div class="brand">
            <div class="brand-logos">
                <img src="/assets/custom_theme/images/QC.png" alt="QC Logo" class="brand-logo">
                <img src="/assets/custom_theme/images/MC.png" alt="MC Logo" class="brand-logo">
            </div>
            <h1>Login to QC & MC ERP</h1>
        </div>

        <form method="post" action="/api/method/frappe.www.login.login" id="login-form">
            <div id="login-error" style="color: red; margin-bottom: 10px; display: none;"></div>

            <input type="hidden" name="cmd" value="login">
            <input type="hidden" name="redirect-to" value="/app">

            <!-- Email/Username Field -->
            <div class="form-row">
                <label for="usr">Email or Username</label>
                <span class="input-icon">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M4 6h16v12H4z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                        <path d="m5 7 7 6 7-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </span>
                <input id="usr" name="usr" type="text" placeholder="jane@example.com" autocomplete="username" required autofocus>
            </div>

            <!-- Password Field -->
            <div class="form-row">
                <label for="pwd">Password</label>
                <span class="input-icon">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <rect x="5" y="11" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.8"/>
                        <path d="M8 11V8a4 4 0 1 1 8 0v3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                    </svg>
                </span>
                <input id="pwd" name="pwd" type="password" placeholder="••••••" autocomplete="current-password" required>
                <button type="button" class="toggle-password" aria-label="Show password">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                        <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/>
                    </svg>
                    <span class="text-muted">Show</span>
                </button>
            </div>

            <!-- Login Button & Forgot Password -->
            <div class="form-actions">
                <button type="submit" class="btn">Login</button>
                <a href="/forgot_password" class="link">Forgot Password?</a>
            </div>
        </form>
    </div>
</div>
{%- endblock %}

{%- block footer %}
<div class="custom-footer">
    Copyright © 2025 QC Styropackaging & Multiplast Corporation | Powered by QCMC MIS
</div>

<!-- Include external login JS -->
<script src="/assets/custom_theme/js/login.js"></script>
{%- endblock %}
