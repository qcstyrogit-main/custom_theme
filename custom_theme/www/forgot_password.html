{%- extends "templates/web.html" -%}

{%- block head %} 
{{ super() }}
<!-- Use the same login CSS for consistent design -->
<link rel="stylesheet" href="/assets/custom_theme/css/forgot_password.css">
{%- endblock %}

{%- block page_content %}
<div class="custom-login-page">
    <div class="login-right">
        <div class="brand">
            <div class="brand-logos">
                <img src="/assets/custom_theme/images/QC.png" alt="QC Logo" class="brand-logo">
                <img src="/assets/custom_theme/images/MC.png" alt="MC Logo" class="brand-logo">
            </div>
            <h1>Reset Your Password</h1>
        </div>

        <form id="reset-form">
            <div class="form-row">
                <label for="email">Email</label>
                <span class="input-icon">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <use href="#es-line-email"></use>
                    </svg>
                </span>
                <input id="email" name="email" type="email" placeholder="Enter your email" required>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn">Reset Password</button>
                <button type="button" class="btn back-login" onclick="window.location.href='/login'">Back to Login</button>
            </div>
        </form>
    </div>
</div>
{%- endblock %}

{% block footer %}
<div class="custom-footer">
    Copyright © 2025 QC Styropackaging & Multiplast Corporation | Powered by QCMC MIS
</div>

<script src="/assets/custom_theme/js/forgot_password.js"></script>
{% endblock %}
