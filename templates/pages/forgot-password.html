{%- extends "templates/web.html" -%}

{%- block head %} 
{{ super() }}
<style>
/* Hide header, nav, footer */
header, .navbar, .top-bar, footer { display: none !important; }

html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    font-family: 'Arial', sans-serif;
    overflow: hidden;
    background-color: #133880;
}

/* Centered container */
.custom-reset-page {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100%;
    width: 100%;
}

.reset-container {
    width: 360px;
    padding: 2rem;
    background-color: rgba(255,255,255,0.95);
    border-radius: 12px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* Branding */
.brand { text-align: center; margin-bottom: 2rem; }
.brand img { max-width: 120px; height: auto; }

/* Form rows */
.form-row {
    position: relative;
    width: 100%;
    margin-bottom: 1.2rem;
}
.form-row input {
    width: 100%;
    padding: 0.65rem 0.8rem 0.65rem 2.5rem;
    font-size: 0.95rem;
    border: 1px solid #ccc;
    border-radius: 6px;
    box-sizing: border-box;
}
.input-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-30%);
    color: #888;
    pointer-events: none;
}

/* Buttons */
.btn {
    width: 100%;
    padding: 0.7rem;
    font-size: 0.95rem;
    font-weight: 600;
    border-radius: 8px;
    background-color: #007bff;
    color: #fff;
    margin-bottom: 0.7rem;
    text-align: center;
    cursor: pointer;
    transition: 0.2s;
}
.btn:hover { background-color: #0056b3; }

.back-login {
    background-color: #6c757d;
}
.back-login:hover { background-color: #495057; }
</style>
{%- endblock %}

{%- block page_content %}
<div class="custom-reset-page">
    <div class="reset-container">
        <div class="brand">
            <img src="/assets/custom_theme/images/QC.png" alt="QC Logo">
            <img src="/assets/custom_theme/images/MC.png" alt="MC Logo">
        </div>

        <form id="reset-form">
            <div class="form-row">
                <span class="input-icon">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <use href="#es-line-email"></use>
                    </svg>
                </span>
                <input id="email" name="email" type="email" placeholder="Enter your email" required>
            </div>

            <button type="submit" class="btn">Reset Password</button>
        </form>

        <button class="btn back-login" onclick="window.location.href='/login'">Back to Login</button>
    </div>
</div>

<script>
document.getElementById('reset-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const email = document.getElementById('email').value;

    if (!email) {
        frappe.msgprint('Please enter your email.');
        return;
    }

    frappe.call({
        method: 'frappe.core.doctype.user.user.reset_password',
        args: { user: email },
        callback: function(r) {
            if (r.message) {
                frappe.msgprint('Password reset email sent.');
            }
        }
    });
});
</script>
{%- endblock %}

{% block footer %}
<div class="custom-footer">
    Copyright © 2025 QC Styropackaging & Multiplast Corporation | Powered by QCMC MIS
</div>
{% endblock %}
